<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salesforce Developer Flashcards</title>
<style>
:root {
  --bg: #eef4fb;
  --bg2: #e6f0fa;
  --surface: rgba(255,255,255,0.72);
  --surface2: rgba(255,255,255,0.88);
  --border: rgba(80,140,220,0.22);
  --text-primary: #1a2d4a;
  --text-secondary: #4a7aaa;
  --primary: #2a7fd4;
  --primary-dim: rgba(42,127,212,0.10);
  --error: #d63060;
  --radius: 12px;
  --font: 'Inter', 'Helvetica Neue', Arial, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg2);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background-image:
    radial-gradient(ellipse at 15% 10%,  rgba(160,190,255,0.55) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%,  rgba(120,200,255,0.40) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 45%,  rgba(180,210,255,0.25) 0%, transparent 45%),
    radial-gradient(ellipse at 75% 15%,  rgba(200,180,255,0.30) 0%, transparent 40%);
  background-attachment: fixed;
}
header {
  background: rgba(255,255,255,0.60); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(80,140,220,0.18);
  color: #1a2d4a;
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(80,140,220,0.10);
  flex-shrink: 0;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: .3px;
}
.logo svg { flex-shrink: 0; }
.total-badge {
  font-size: 12px;
  background: rgba(42,127,212,0.10);
  border: 1px solid rgba(42,127,212,0.25);
  border-radius: 12px;
  padding: 2px 10px;
  font-weight: 500;
}
.chapter-bar {
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(80,140,220,0.18);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.chapter-bar::-webkit-scrollbar { display: none; }
.cht-tab {
  flex-shrink: 0;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.cht-tab:hover { color: var(--primary); }
.cht-tab.active {
  color: var(--text-primary);
  border-bottom-color: var(--primary);
  background: rgba(42,127,212,0.10);
}
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 32px;
  gap: 16px;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
}
.progress-wrap {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: rgba(42,127,212,0.12);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #2a7fd4, #5aaaf0, #80c8ff);
  border-radius: 3px;
  transition: width .2s ease;
  box-shadow: 0 0 8px rgba(42,127,212,0.35);
}
.progress-text {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  min-width: 52px;
  text-align: right;
}
.card-scene {
  width: 100%;
  min-height: 220px;
  background: rgba(255,255,255,0.68);
  border: 1px solid rgba(80,140,220,0.20);
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(80,140,220,0.12), inset 0 1px 0 rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 28px 28px 20px;
  user-select: none;
}
.card-scene:active { box-shadow: 0 4px 16px rgba(80,140,220,0.15); }
.card-face { transition: opacity .15s ease; }
.card-front { display: flex; flex-direction: column; gap: 16px; }
.card-back  { display: none; flex-direction: column; gap: 16px; }
.card-scene.flipped .card-front { display: none; }
.card-scene.flipped .card-back  { display: flex; }
.card-hint {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  font-weight: 600;
}
.card-zh {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.45;
  color: var(--text-primary);
}
.card-en {
  font-size: 19px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text-primary);
}
.vocab-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}
.vocab-chip {
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 12px;
  background: rgba(42,127,212,0.10);
  border: 1px solid rgba(42,127,212,0.25);
  color: #1a5fa0;
  font-weight: 500;
  letter-spacing: .3px;
}
.flip-hint {
  position: absolute;
  bottom: 10px;
  right: 14px;
  font-size: 11px;
  color: rgba(42,127,212,0.35);
  letter-spacing: 0.5px;
}
.nav-row {
  display: flex;
  align-items: center;
  gap: 12px;
  width: 100%;
  justify-content: center;
}
.nav-btn {
  background: rgba(126,200,255,0.08);
  border: 1px solid rgba(126,200,255,0.25);
  border-radius: var(--radius);
  padding: 8px 24px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-primary);
  transition: background .15s, border-color .15s, box-shadow .15s;
  backdrop-filter: blur(8px);
}
.nav-btn:hover:not(:disabled) {
  background: rgba(126,200,255,0.18);
  border-color: rgba(126,200,255,0.5);
  box-shadow: 0 0 12px rgba(126,200,255,0.2);
}
.nav-btn:disabled { color: rgba(126,200,255,0.2); cursor: default; }
.nav-count {
  font-size: 14px;
  color: var(--text-secondary);
  min-width: 70px;
  text-align: center;
}
.tool-row {
  display: flex;
  gap: 10px;
}
.tool-btn {
  background: rgba(255,255,255,0.60);
  border: 1px solid rgba(42,127,212,0.20);
  border-radius: var(--radius);
  padding: 6px 18px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  color: var(--text-secondary);
  transition: background .15s, color .15s, box-shadow .15s;
  backdrop-filter: blur(8px);
}
.tool-btn:hover { background: rgba(255,255,255,0.88); color: var(--text-primary); }
.tool-btn.active { background: rgba(42,127,212,0.12); color: var(--primary); border-color: rgba(42,127,212,0.45); box-shadow: 0 2px 10px rgba(42,127,212,0.18); }
.list-toggle {
  width: 100%;
  text-align: center;
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  padding: 4px;
  font-weight: 500;
}
.list-toggle:hover { text-decoration: underline; }
.list-view {
  width: 100%;
  display: none;
  flex-direction: column;
  gap: 1px;
  border: 1px solid rgba(42,127,212,0.18);
  border-radius: var(--radius);
  overflow: hidden;
  background: rgba(42,127,212,0.06);
}
.list-view.open { display: flex; }
.list-item {
  background: rgba(255,255,255,0.62);
  padding: 10px 14px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 3px;
  transition: background .1s;
}
.list-item:hover { background: rgba(255,255,255,0.88); }
.list-item.current { background: rgba(42,127,212,0.10); }
.list-item .li-zh { color: var(--text-primary); font-weight: 500; }
.list-item .li-en { color: var(--primary); font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M12 2C9.2 2 7 4.2 7 7c0 .8.2 1.5.5 2.2C6.6 9.1 5.8 9 5 9c-2.2 0-4 1.8-4 4s1.8 4 4 4h14c2.2 0 4-1.8 4-4 0-2-1.4-3.6-3.3-3.9.2-.5.3-1.1.3-1.6C20 5.3 17.7 3 15 3c-1 0-1.9.3-2.7.8C11.8 2.7 11.3 2 12 2z" fill="white"/>
      <text x="12" y="15.5" text-anchor="middle" fill="#0176d3" font-size="7" font-weight="bold" font-family="Arial">SF</text>
    </svg>
    Salesforce Developer Flashcards
  </div>
  <div class="total-badge" id="totalBadge">500 sentences</div>
</header>

<div class="chapter-bar" id="chapterBar"></div>

<div class="main">
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <div class="card-scene" id="card" onclick="flip()">
    <div class="card-face card-front">
      <div class="card-hint">Chinese &rarr; tap to reveal</div>
      <div class="card-zh" id="cardZh"></div>
      <div class="vocab-row" id="vocabRow"></div>
    </div>
    <div class="card-face card-back">
      <div class="card-hint">English</div>
      <div class="card-en" id="cardEn"></div>
    </div>
    <div class="flip-hint">click to flip</div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="btnPrev" onclick="go(-1)">← Prev</button>
    <span class="nav-count" id="navCount"></span>
    <button class="nav-btn" id="btnNext" onclick="go(1)">Next →</button>
  </div>

  <div class="tool-row">
    <button class="tool-btn" id="btnShuffle" onclick="toggleShuffle()">⇄ Shuffle</button>
    <button class="tool-btn" onclick="restart()">↺ Restart</button>
  </div>

  <div class="list-toggle" onclick="toggleList()" id="listToggle">▾ Show chapter list</div>
  <div class="list-view" id="listView"></div>
</div>

<script>
const sentences = [
// ===== 1-20: Apex 基础语法与类 =====
{zh:"这个类需要用 @AuraEnabled 注解，这样 LWC 才能调用它。",en:"This class needs the @AuraEnabled annotation so LWC can call it.",vocab:"@AuraEnabled, annotation, LWC"},
{zh:"我把这个方法设成了 static，所以不需要实例化就能调用。",en:"I made this method static, so you can call it without instantiating the class.",vocab:"static, instantiate"},
{zh:"这个变量声明成了 final，之后不能再重新赋值了。",en:"This variable is declared as final, so it can't be reassigned after that.",vocab:"final, declare, reassign"},
{zh:"我用了 Map 来存储账户 ID 和对应记录，查找速度更快。",en:"I used a Map to store Account IDs with their records, which makes lookups a lot faster.",vocab:"Map, lookup"},
{zh:"这里有个空指针异常，你在访问对象之前需要先做非空检查。",en:"There's a null pointer exception here. You need to do a null check before accessing the object.",vocab:"null pointer exception, null check"},
{zh:"这个构造函数有两个参数，分别是名称和类型。",en:"This constructor takes two parameters: the name and the type.",vocab:"constructor, parameter"},
{zh:"我把这个类设成了 virtual，方便子类去继承和重写方法。",en:"I made this class virtual so subclasses can extend and override its methods.",vocab:"virtual, subclass, override"},
{zh:"Apex 里的 Integer 和 Long 类型在处理大数字时要注意溢出问题。",en:"In Apex, watch out for overflow when using Integer versus Long for large numbers.",vocab:"Integer, Long, overflow"},
{zh:"这个方法我加了 @future 注解，让它在异步上下文里运行。",en:"I annotated this method with @future so it runs in an async context.",vocab:"@future, async, annotate"},
{zh:"这里的 try-catch 块捕获了 DML 异常，避免整个事务回滚。",en:"The try-catch block here catches the DML exception to prevent the whole transaction from rolling back.",vocab:"try-catch, DML exception, rollback"},
{zh:"我们需要把这些记录装进一个 List 再批量处理，而不是一条一条来。",en:"We need to put these records into a List and process them in bulk, not one by one.",vocab:"List, bulk, process"},
{zh:"这个接口定义了两个方法，所有实现类都必须实现这两个方法。",en:"This interface defines two methods that all implementing classes must provide.",vocab:"interface, implement"},
{zh:"你能帮我看一下这段逻辑吗？我觉得条件判断写反了。",en:"Can you take a look at this logic? I think the condition is the wrong way around.",vocab:"condition, logic"},
{zh:"Enum 在这里比硬编码字符串要好，代码可读性更强。",en:"Using an Enum here is better than hard-coded strings since it makes the code a lot more readable.",vocab:"Enum, hard-coded, readable"},
{zh:"这个方法接受 Account 类型的参数，不是 SObject。",en:"This method takes an Account parameter, not an SObject.",vocab:"Account, SObject, parameter"},
{zh:"我用了 String.format 来动态拼接消息，避免字符串拼接性能问题。",en:"I used String.format to build the message dynamically instead of concatenating strings.",vocab:"String.format, concatenate, dynamic"},
{zh:"这段代码里有个无限循环，你需要加一个退出条件。",en:"There's an infinite loop in this code. You need to add an exit condition.",vocab:"infinite loop, exit condition"},
{zh:"这个方法需要返回一个 Boolean，不是 void。",en:"This method needs to return a Boolean, not void.",vocab:"Boolean, void, return"},
{zh:"Apex 不支持多重继承，一个类只能继承一个父类。",en:"Apex doesn't support multiple inheritance. A class can only extend one parent class.",vocab:"multiple inheritance, extend"},
{zh:"我把公共方法做成了私有的，因为它只在类内部使用。",en:"I made the public method private since it's only used inside the class.",vocab:"private, public, access modifier"},
// ===== 21-40: SOQL & SOSL 查询 =====
{zh:"这个 SOQL 查询没有 WHERE 子句，在大数据量下会触发 Governor Limit。",en:"This SOQL query has no WHERE clause, which will hit the Governor Limit on large datasets.",vocab:"SOQL, WHERE clause, Governor Limit"},
{zh:"我加了 LIMIT 200 来控制返回记录数，避免查询超限。",en:"I added LIMIT 200 to cap the number of records returned and avoid hitting query limits.",vocab:"LIMIT, query limit"},
{zh:"你能把这个查询改成用 bind 变量吗？直接拼字符串有 SOQL 注入风险。",en:"Can you switch this query to use bind variables? Concatenating strings directly is a SOQL injection risk.",vocab:"bind variable, SOQL injection"},
{zh:"这个查询需要关联查询子对象，用子查询就可以了。",en:"This query needs to pull in child records too, so use a subquery for that.",vocab:"subquery, child records, relationship"},
{zh:"ORDER BY CreatedDate DESC 能保证你拿到的是最新的记录。",en:"ORDER BY CreatedDate DESC makes sure you're getting the most recent records.",vocab:"ORDER BY, CreatedDate"},
{zh:"我用 COUNT() 来统计符合条件的记录数，不需要取出所有数据。",en:"I used COUNT() to get the number of matching records without pulling all the data.",vocab:"COUNT(), aggregate"},
{zh:"多态查询用 TYPEOF 来处理不同对象类型，比较少见但有时候很有用。",en:"Polymorphic queries use TYPEOF to handle different object types. It's not that common, but it's useful sometimes.",vocab:"polymorphic, TYPEOF"},
{zh:"这个查询跑在循环里面了，每次循环都会消耗一次查询次数，必须提到循环外面去。",en:"This query is inside a loop, so it's consuming a query every iteration. You need to move it outside the loop.",vocab:"query in loop, iteration, bulkify"},
{zh:"SOSL 适合跨多个对象做全文搜索，SOQL 更适合精确字段查询。",en:"SOSL is good for full-text searches across multiple objects. SOQL is better when you're querying specific fields.",vocab:"SOSL, full-text search, SOQL"},
{zh:"我加了 FOR UPDATE 来锁定记录，防止并发更新产生冲突。",en:"I added FOR UPDATE to lock the records and prevent conflicts from concurrent updates.",vocab:"FOR UPDATE, lock, concurrent"},
{zh:"这个字段是自定义字段，在 SOQL 里要加 __c 后缀。",en:"This is a custom field, so it needs the __c suffix in SOQL.",vocab:"custom field, __c, suffix"},
{zh:"用 WITH SECURITY_ENFORCED 可以确保查询遵守字段级安全设置。",en:"Using WITH SECURITY_ENFORCED makes sure the query respects field-level security.",vocab:"WITH SECURITY_ENFORCED, field-level security"},
{zh:"我在 WHERE 子句里用了 IN 操作符来匹配一组 ID。",en:"I used the IN operator in the WHERE clause to match against a set of IDs.",vocab:"IN operator, WHERE clause"},
{zh:"这个查询跨越了三层关系，性能会比较差，最好拆成两次查询。",en:"This query spans three levels of relationships, so performance will suffer. It's probably better to split it into two queries.",vocab:"relationship query, performance"},
{zh:"NULL 值在 SOQL 里用 = null 来过滤，不是 IS NULL。",en:"In SOQL, you filter for null values with = null, not IS NULL.",vocab:"null, filter, SOQL syntax"},
{zh:"我在 SELECT 里只取了需要的字段，不要用 SELECT * 这种写法。",en:"I'm only selecting the fields we actually need in the SELECT. Don't use SELECT * style queries.",vocab:"SELECT, field selection, best practice"},
{zh:"这个查询结果需要按 AccountId 分组，可以用 GROUP BY。",en:"The query results need to be grouped by AccountId, so use GROUP BY for that.",vocab:"GROUP BY, aggregate query"},
{zh:"Date 字面量比如 LAST_N_DAYS:30 在 SOQL 里用起来很方便。",en:"Date literals like LAST_N_DAYS:30 are really handy in SOQL.",vocab:"date literal, LAST_N_DAYS"},
{zh:"我给这个查询加了 OFFSET 来实现分页功能。",en:"I added OFFSET to this query to implement pagination.",vocab:"OFFSET, pagination"},
{zh:"你可以在 Developer Console 里的 Query Editor 里跑一下这个 SOQL，确认结果对不对。",en:"You can run this SOQL in the Query Editor in the Developer Console to check if the results are right.",vocab:"Developer Console, Query Editor"},
// ===== 41-60: 触发器（Triggers）=====
{zh:"这个触发器需要处理批量操作，不能假设每次只有一条记录。",en:"This trigger needs to handle bulk operations. You can't assume there's only one record at a time.",vocab:"trigger, bulk, batch"},
{zh:"我们把触发器逻辑都放到了 Handler 类里，保持触发器本身精简。",en:"We moved all the trigger logic into a Handler class to keep the trigger itself lean.",vocab:"trigger handler, separation of concerns"},
{zh:"before insert 触发器适合做数据校验，before update 适合做字段默认值设置。",en:"Before insert triggers are good for validation, and before update triggers are good for setting default field values.",vocab:"before insert, before update, validation"},
{zh:"after insert 触发器拿到的是已经提交到数据库的记录，带有 ID。",en:"The after insert trigger gives you records that have already been committed to the database, so they have IDs.",vocab:"after insert, committed, record ID"},
{zh:"这个触发器在 Trigger.new 和 Trigger.old 里做比较，检测字段是否变化了。",en:"This trigger compares Trigger.new and Trigger.old to detect if a field has changed.",vocab:"Trigger.new, Trigger.old, field change"},
{zh:"我们写了一个递归保护，防止触发器在更新过程中自己触发自己。",en:"We added a recursion guard to prevent the trigger from firing on itself during an update.",vocab:"recursion guard, recursive trigger"},
{zh:"这个触发器里有 DML，放在循环里面了，会很快触发 Limit。",en:"There's a DML inside a loop in this trigger, which will hit limits fast.",vocab:"DML in loop, Governor Limit"},
{zh:"触发器里不能直接查询 setup 对象，比如 User 的某些字段，会报错。",en:"You can't directly query certain setup objects like User fields inside a trigger. It'll throw an error.",vocab:"setup object, mixed DML error"},
{zh:"我们用 TriggerDispatcher 模式来决定哪个 Handler 处理哪个事件。",en:"We use the TriggerDispatcher pattern to route each event to the right Handler.",vocab:"TriggerDispatcher, pattern, event"},
{zh:"这个触发器应该加一个开关，方便在数据迁移时临时关闭它。",en:"This trigger should have a bypass switch so we can turn it off temporarily during data migrations.",vocab:"bypass, trigger switch, data migration"},
{zh:"删除操作只有 before delete 和 after delete，没有 update。",en:"For delete operations, you only have before delete and after delete. There's no update equivalent.",vocab:"before delete, after delete"},
{zh:"undelete 触发器在从回收站恢复记录时触发。",en:"The undelete trigger fires when records are restored from the Recycle Bin.",vocab:"undelete trigger, Recycle Bin"},
{zh:"这个触发器的顺序和其他触发器有冲突，需要调整一下执行顺序。",en:"This trigger is conflicting with another trigger in terms of execution order. We need to sort that out.",vocab:"trigger order, execution order"},
{zh:"我在 Handler 类里用了 static 变量来跟踪触发器是否已经运行过了。",en:"I used a static variable in the Handler class to track whether the trigger has already run.",vocab:"static variable, trigger tracking"},
{zh:"测试这个触发器时需要插入测试数据，然后验证关联记录是否正确创建了。",en:"To test this trigger, insert some test data and then verify the related records were created correctly.",vocab:"test data, verify, related records"},
{zh:"这个触发器需要考虑到记录可能是通过 API 批量导入进来的情况。",en:"This trigger needs to account for records being bulk-imported via API.",vocab:"API, bulk import, account for"},
{zh:"我们把公共的触发器工具方法抽出来放到 TriggerUtil 类里了。",en:"We extracted the shared trigger utility methods into a TriggerUtil class.",vocab:"utility class, extract, shared methods"},
{zh:"这里用 addError 方法可以阻止记录保存，并给用户显示一条错误消息。",en:"You can use addError here to block the record from saving and show the user an error message.",vocab:"addError, block save, error message"},
{zh:"触发器里的 Map<Id, SObject> 能帮你快速按 ID 查找旧值。",en:"A Map<Id, SObject> inside the trigger lets you quickly look up old values by ID.",vocab:"Map, Trigger.oldMap, lookup"},
{zh:"这个触发器的逻辑应该写单元测试，覆盖正向和边界场景。",en:"The logic in this trigger should have unit tests covering both the happy path and edge cases.",vocab:"unit test, happy path, edge case"},

// ===== 201-220: 部署与 DevOps =====

// ===== 241-260: Git & Code Review =====

// ===== 381-400: Calculation Procedures =====
{zh:"Calculation Procedure 用来实现复杂的定价、折扣或评分规则，不需要写代码。",en:"Calculation Procedures let you implement complex pricing, discount, or scoring rules without writing code.",vocab:"Calculation Procedure, pricing, no-code"},
{zh:"我配置了一个 Calculation Matrix 来根据产品类型和数量决定适用的折扣比例。",en:"I configured a Calculation Matrix to determine the applicable discount rate based on product type and quantity.",vocab:"Calculation Matrix, discount, product type"},
{zh:"这个 Procedure 有多个步骤，每一步都在前一步的基础上累积计算。",en:"This Procedure has multiple steps, and each one builds on the result of the previous step.",vocab:"procedure steps, cumulative, calculation"},
{zh:"Decision Matrix 里的每一行是一条规则，按优先级从上到下匹配，找到第一条符合的就停止。",en:"Each row in the Decision Matrix is a rule, matched top to bottom by priority. It stops at the first match.",vocab:"Decision Matrix, priority, rule matching"},
{zh:"我用了 Aggregation 步骤来对一组数字做求和，比如计算总费用。",en:"I used an Aggregation step to sum up a group of numbers, like calculating the total cost.",vocab:"Aggregation, sum, total cost"},
{zh:"Calculation Procedure 可以被 OmniScript 和 Integration Procedure 通过 Action 来调用。",en:"Calculation Procedures can be invoked via Actions from both OmniScript and Integration Procedures.",vocab:"invoke, Action, OmniScript, IP"},
{zh:"这个 Formula 步骤用了条件表达式，根据评分结果返回不同的风险等级。",en:"This Formula step uses a conditional expression to return different risk levels based on the score.",vocab:"Formula, conditional, risk level"},
{zh:"Matrix 的行里用了通配符，这样可以匹配没有精确对应值的情况。",en:"The matrix rows use wildcards to handle cases where there's no exact matching value.",vocab:"wildcard, Matrix, fallback"},
{zh:"Calculation Procedure 的版本管理很重要，上线前要确认用的是正确的激活版本。",en:"Version management for Calculation Procedures is important. Make sure you're on the right activated version before going live.",vocab:"version, activated, Calculation Procedure"},
{zh:"我在测试 Procedure 时用了 Procedure Testing 面板来传入测试输入，验证输出是否正确。",en:"I used the Procedure Testing panel to pass in test inputs and verify the output is correct.",vocab:"Procedure Testing, test input, verify output"},
{zh:"这个步骤的输出会作为下一个步骤的输入，变量名要保持一致。",en:"The output of this step becomes the input for the next one, so the variable names need to be consistent.",vocab:"output, input, variable name"},
{zh:"我设置了 Error Handling，当输入值不符合预期时返回默认值而不是报错。",en:"I set up Error Handling to return a default value instead of throwing an error when the input is unexpected.",vocab:"Error Handling, default value, fallback"},
{zh:"Calculation Matrix 的数据可以导入 CSV，方便批量维护规则。",en:"Calculation Matrix data can be imported via CSV, which makes bulk rule maintenance easier.",vocab:"CSV import, matrix data, bulk maintenance"},
{zh:"这个 Procedure 的计算逻辑和原来的 Apex 类完全等价，我们用它替换掉 Apex 了。",en:"The calculation logic in this Procedure is equivalent to the original Apex class. We replaced the Apex with it.",vocab:"equivalent, replace, Apex migration"},
{zh:"Range 条件在 Matrix 里用来匹配数值区间，比如金额在 0 到 1000 之间。",en:"Range conditions in the Matrix are used to match numeric ranges, like amounts between 0 and 1000.",vocab:"Range condition, numeric range, Matrix"},
{zh:"Calculation Step 支持引用 Custom Settings 里的配置值，避免硬编码。",en:"Calculation Steps support referencing values from Custom Settings to avoid hard-coding.",vocab:"Custom Settings, reference, no hard-code"},
{zh:"这个 Procedure 被多个产品线共用，改动之前要评估对所有场景的影响。",en:"This Procedure is shared across multiple product lines. Assess the impact on all scenarios before making changes.",vocab:"shared, impact assessment, product line"},
{zh:"IP 里调用 Calculation Procedure 的方式是用 Calculation Procedure Action 步骤。",en:"To call a Calculation Procedure from an IP, use a Calculation Procedure Action step.",vocab:"Calculation Procedure Action, IP, invoke"},
{zh:"我把经常变化的阈值从代码里提到了 Calculation Matrix 里，运营团队可以自己维护。",en:"I moved frequently changing thresholds from the code into a Calculation Matrix so the operations team can maintain them.",vocab:"threshold, matrix, ops team"},
{zh:"这个 Procedure 计算结果不对，我在 Testing 面板里一步一步追踪每个步骤的中间值。",en:"The Procedure is giving wrong results. I'm stepping through each stage in the Testing panel to trace the intermediate values.",vocab:"Testing panel, intermediate value, trace"},
// ===== 401-420: OmniStudio 调试 =====
{zh:"OmniStudio 有个内置的 Debug 模式，可以在运行时看到每个步骤的输入和输出。",en:"OmniStudio has a built-in Debug mode that shows you the input and output of each step at runtime.",vocab:"Debug mode, runtime, input/output"},
{zh:"我打开了 OmniScript 的 Debug Panel，看到是第三步的 DataRaptor 返回了空数据。",en:"I opened the OmniScript Debug Panel and saw the DataRaptor in step three is returning empty data.",vocab:"Debug Panel, OmniScript, empty data"},
{zh:"Integration Procedure 的 Debug 输出会显示每个 Action 的执行状态和输出值。",en:"The IP Debug output shows the execution status and output values for each Action.",vocab:"IP Debug, execution status, output value"},
{zh:"我用 DataRaptor 的 Preview 功能快速验证了一下数据映射是否正确。",en:"I used DataRaptor's Preview to quickly check whether the data mapping is correct.",vocab:"Preview, data mapping, validate"},
{zh:"这个 OmniScript 在移动端有布局问题，我打开了响应式预览来排查。",en:"This OmniScript has a layout issue on mobile. I opened the responsive preview to investigate.",vocab:"mobile, layout issue, responsive preview"},
{zh:"IP 里有个步骤失败了但没有抛出错误，我加了 Error Check 来捕获静默失败。",en:"One step in the IP failed silently without throwing an error. I added an Error Check to catch silent failures.",vocab:"silent failure, Error Check, IP"},
{zh:"我在 DataRaptor Transform 里加了日志输出，帮助追踪数据转换的中间结果。",en:"I added log outputs in the DataRaptor Transform to help trace the intermediate results of the data conversion.",vocab:"log output, Transform, trace"},
{zh:"FlexCard 显示了空白，我检查了一下，发现 DataRaptor 返回的节点名和 FlexCard 里引用的不一致。",en:"The FlexCard is showing blank. I checked and found the node name returned by DataRaptor doesn't match what the FlexCard is referencing.",vocab:"blank FlexCard, node name mismatch, DataRaptor"},
{zh:"我用了 OmniStudio Inspector Chrome 插件来实时查看 OmniScript 的数据状态。",en:"I used the OmniStudio Inspector Chrome extension to view the OmniScript data state in real time.",vocab:"OmniStudio Inspector, Chrome extension, data state"},
{zh:"这个 Remote Action 调用失败了，在网络面板里看到返回了 500，说明后端有 Apex 报错。",en:"This Remote Action call failed. The Network panel shows a 500 response, which means there's an Apex error on the backend.",vocab:"Remote Action, 500, Apex error"},
{zh:"IP 的某个步骤被跳过了，我检查了 Conditional 配置，发现条件写反了。",en:"One of the IP steps was being skipped. I checked the Conditional config and found the condition was inverted.",vocab:"step skipped, Conditional, inverted"},
{zh:"我用 Test Coverage Report 检查了哪些 OmniStudio 组件没有被测试覆盖到。",en:"I used the Test Coverage Report to check which OmniStudio components aren't covered by tests.",vocab:"Test Coverage Report, component coverage"},
{zh:"DataRaptor Load 在沙盒里能跑通，但在生产上报了 FIELD_INTEGRITY_EXCEPTION，需要检查数据。",en:"The DataRaptor Load works in the sandbox but throws a FIELD_INTEGRITY_EXCEPTION in production. The data needs to be checked.",vocab:"FIELD_INTEGRITY_EXCEPTION, production, data integrity"},
{zh:"这个问题我在本地 Debug 里能重现，但用户账号上不行，应该是权限导致的。",en:"I can reproduce this in my Debug session, but not on the user's account, which points to a permissions issue.",vocab:"reproduce, user account, permissions"},
{zh:"我在 IP 里把每个关键步骤的输出都打印到了 Log，这样出问题时方便追溯。",en:"I'm logging the output of each key step in the IP so it's easy to trace back when something goes wrong.",vocab:"log, output, trace"},
{zh:"OmniScript 在提交时报了一个 JSON Parse Error，是某个字段传了非法字符。",en:"The OmniScript threw a JSON Parse Error on submission. One of the fields had an invalid character.",vocab:"JSON Parse Error, invalid character, submission"},
{zh:"我对 IP 里的 HTTP Action 加了超时配置，避免外部 API 无响应时 IP 一直挂着。",en:"I added a timeout config to the HTTP Action in the IP to prevent it from hanging indefinitely if the external API stops responding.",vocab:"timeout, HTTP Action, hang"},
{zh:"这个 DataRaptor Extract 返回的数组是空的，但数据库里明明有记录，过滤条件有问题。",en:"The DataRaptor Extract is returning an empty array, but the records are definitely there in the database. The filter condition is the issue.",vocab:"empty array, filter condition, DataRaptor"},
{zh:"FlexCard 的 Action 没有触发，我发现是 Condition 设置阻止了 Action 的执行。",en:"The FlexCard Action wasn't firing. I found a Condition setting was blocking it from executing.",vocab:"Action not firing, Condition, blocking"},
{zh:"我用了 Omni Process 日志来审查哪些 IP 运行失败了，以及失败的原因。",en:"I used the Omni Process logs to review which IPs had failed runs and why.",vocab:"Omni Process log, failure review, audit"},
// ===== 421-440: OmniStudio 部署 =====
{zh:"OmniStudio 组件可以通过 DataPack 导出和导入，用于跨 org 部署。",en:"OmniStudio components can be exported and imported as DataPacks for cross-org deployment.",vocab:"DataPack, export, import"},
{zh:"我用 vlocity-build 工具把 DataPack 部署到目标 org，整合到了 CI/CD 流水线里。",en:"I used the vlocity-build tool to deploy the DataPack to the target org and integrated it into the CI/CD pipeline.",vocab:"vlocity-build, DataPack, CI/CD"},
{zh:"部署前需要检查目标 org 的版本是否支持这些 OmniStudio 功能，版本不对会报错。",en:"Before deploying, check that the target org's version supports these OmniStudio features. A version mismatch will cause errors.",vocab:"version compatibility, target org, OmniStudio"},
{zh:"这个 DataPack 包含了 OmniScript、FlexCard 和对应的 DataRaptor，需要整包部署。",en:"This DataPack contains the OmniScript, FlexCard, and associated DataRaptors. They need to be deployed together.",vocab:"DataPack, full deployment, dependency"},
{zh:"我在部署后用 Activation 步骤激活了新版本的 OmniScript 和 FlexCard。",en:"After deploying, I ran the Activation step to activate the new versions of the OmniScript and FlexCard.",vocab:"Activation, activate, new version"},
{zh:"DataPack 里有依赖的 Custom Object，目标 org 里必须先有这个对象才能导入。",en:"The DataPack has a dependency on a Custom Object that must already exist in the target org before importing.",vocab:"dependency, Custom Object, prerequisite"},
{zh:"我们用了 Source Control 来版本化管理所有的 OmniStudio DataPacks。",en:"We use Source Control to version all OmniStudio DataPacks.",vocab:"Source Control, versioning, DataPack"},
{zh:"部署失败了，报了 dependency conflict，说明有个引用的组件在目标 org 里不存在。",en:"The deployment failed with a dependency conflict, which means a referenced component doesn't exist in the target org.",vocab:"dependency conflict, deployment failure, missing component"},
{zh:"我们分 UAT 和 Prod 两个阶段部署，UAT 没问题再推到 Prod。",en:"We deploy in two phases: UAT first, then Prod once UAT passes.",vocab:"phased deployment, UAT, Prod"},
{zh:"DataPack 导出的时候我选了 Full Export，确保所有子组件都包含进去了。",en:"When exporting the DataPack, I chose Full Export to make sure all child components are included.",vocab:"Full Export, sub-components, DataPack"},
{zh:"我们在部署 Pipeline 里加了一步自动运行 OmniStudio 测试，失败就阻断部署。",en:"We added a step in the deployment pipeline to automatically run OmniStudio tests and block deployment if they fail.",vocab:"automated test, pipeline, block deployment"},
{zh:"这个组件依赖了一个 Named Credential，目标 org 里需要提前配置好。",en:"This component depends on a Named Credential that needs to be configured in the target org beforehand.",vocab:"Named Credential, pre-configure, dependency"},
{zh:"OmniStudio 组件的激活状态不会随 DataPack 一起迁移，需要手动激活。",en:"The activated status of OmniStudio components isn't carried over with the DataPack. You need to activate them manually.",vocab:"activation status, manual activation, DataPack"},
{zh:"我们把 OmniStudio 和 Apex 的部署合并在同一个 Pipeline 里，统一管理。",en:"We combined OmniStudio and Apex deployment in the same pipeline for unified management.",vocab:"unified pipeline, combined deployment"},
{zh:"部署后要验证所有的 OmniScript 和 FlexCard 在目标 org 里正常展示和运行。",en:"After deployment, verify that all OmniScripts and FlexCards display and function correctly in the target org.",vocab:"post-deployment, verification, smoke test"},
{zh:"我们用了 Environment Variable 来处理不同 org 之间的差异，比如 API endpoint 地址。",en:"We use Environment Variables to handle differences between orgs, like API endpoint URLs.",vocab:"Environment Variable, cross-org, API endpoint"},
{zh:"DataPack 文件放在 Git 里管理，每次改动都有 diff 记录，方便审查。",en:"DataPack files are managed in Git so every change has a diff record for easy review.",vocab:"Git, diff, change review"},
{zh:"部署窗口很短，我们提前准备好了回滚脚本，万一出问题可以快速恢复。",en:"The deployment window is tight, so we prepared a rollback script in advance in case something goes wrong.",vocab:"rollback, deployment window, contingency"},
{zh:"这个 IP 在目标 org 里没有激活的版本，部署后需要手动激活一下。",en:"This IP doesn't have an activated version in the target org yet. It needs to be manually activated after deployment.",vocab:"IP, activated version, manual"},
{zh:"我们的 DataPack 按功能模块分包，避免一次性部署太多组件增加风险。",en:"We package DataPacks by feature module to avoid deploying too many components at once and increasing risk.",vocab:"modular, DataPack, risk management"},

{zh:"Industry 数据模型的字段命名和标准 Salesforce 对象差异较大，需要熟悉一下。",en:"The field naming in the Industry data model differs quite a bit from standard Salesforce objects. Worth getting familiar with.",vocab:"Industry data model, field naming, difference"},

// ===== 461-480: 需求澄清与方案设计 =====

const CHAPTER_NAMES = [
  "Apex 基础语法","SOQL & SOSL","触发器","测试类与覆盖率","Governor Limits",
  "LWC 组件开发","LWC 事件通信","Salesforce 数据模型","安全与权限","API 集成",
  "部署与 DevOps","Debug 排查","Git & Code Review","日常团队协作","OmniScript 基础",
  "OmniScript 高级","FlexCards","DataRaptor","Integration Procedure","Calculation Procedures",
  "OmniStudio 调试","OmniStudio 部署","Vlocity 行业云","需求与方案设计","项目交付复盘"
];

const PER_PAGE = 20;
let chapters = [], deck = [], original = [], curChapter = 0, idx = 0;
let shuffled = false, listOpen = false;

window.addEventListener('DOMContentLoaded', () => {
  // slice into chapters
  for (let i = 0; i < sentences.length; i += PER_PAGE) {
    chapters.push(sentences.slice(i, i + PER_PAGE));
  }
  // build tabs
  const bar = document.getElementById('chapterBar');
  chapters.forEach((_, ci) => {
    const tab = document.createElement('div');
    tab.className = 'cht-tab' + (ci === 0 ? ' active' : '');
    tab.id = 'cht' + ci;
    tab.textContent = (ci + 1) + '. ' + (CHAPTER_NAMES[ci] || '章节' + (ci + 1));
    tab.onclick = () => loadChapter(ci);
    bar.appendChild(tab);
  });
  loadChapter(0);
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); flip(); }
    else if (e.code === 'ArrowLeft') go(-1);
    else if (e.code === 'ArrowRight') go(1);
  });
});

function loadChapter(ci) {
  curChapter = ci;
  document.querySelectorAll('.cht-tab').forEach((t, i) => t.classList.toggle('active', i === ci));
  document.getElementById('cht' + ci).scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  original = [...chapters[ci]];
  deck = [...original];
  shuffled = false;
  document.getElementById('btnShuffle').classList.remove('active');
  idx = 0;
  if (listOpen) buildList();
  showCard();
}

function showCard() {
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  const s = deck[idx];
  document.getElementById('cardZh').textContent = s.zh;
  document.getElementById('cardEn').textContent = s.en;
  const vr = document.getElementById('vocabRow');
  vr.innerHTML = '';
  (s.vocab || '').split(',').forEach(v => {
    const t = v.trim();
    if (t) {
      const chip = document.createElement('span');
      chip.className = 'vocab-chip';
      chip.textContent = t;
      vr.appendChild(chip);
    }
  });
  const total = deck.length;
  document.getElementById('navCount').textContent = (idx + 1) + ' / ' + total;
  const pct = ((idx + 1) / total * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === total - 1;
  // highlight in list
  document.querySelectorAll('.list-item').forEach((el, i) => el.classList.toggle('current', i === idx));
}

function flip() {
  document.getElementById('card').classList.toggle('flipped');
}

function go(dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= deck.length) return;
  idx = newIdx;
  showCard();
  const el = document.querySelector('.list-item.current');
  if (el) el.scrollIntoView({ block: 'nearest' });
}

function toggleShuffle() {
  shuffled = !shuffled;
  document.getElementById('btnShuffle').classList.toggle('active', shuffled);
  if (shuffled) {
    deck = [...original];
    for (let i = deck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
  } else {
    deck = [...original];
  }
  idx = 0;
  if (listOpen) buildList();
  showCard();
}

function restart() {
  idx = 0;
  document.getElementById('card').classList.remove('flipped');
  showCard();
}

function toggleList() {
  listOpen = !listOpen;
  const lv = document.getElementById('listView');
  const lt = document.getElementById('listToggle');
  if (listOpen) {
    lv.classList.add('open');
    lt.textContent = '▴ Hide chapter list';
    buildList();
  } else {
    lv.classList.remove('open');
    lt.textContent = '▾ Show chapter list';
  }
}

function buildList() {
  const lv = document.getElementById('listView');
  lv.innerHTML = '';
  deck.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'list-item' + (i === idx ? ' current' : '');
    item.innerHTML = '<div class="li-zh">' + s.zh + '</div><div class="li-en">' + s.en + '</div>';
    item.onclick = () => { idx = i; showCard(); };
    lv.appendChild(item);
  });
}
</script>
